spring:
  application.name: assignments-redis-index
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
      connect-timeout: 2s
      timeout: 2s
      lettuce:
        pool:
          max-active: 32
          max-idle: 8
          min-idle: 2
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: ${KAFKA_LISTENER_AUTO_STARTUP:true}
    consumer:
      group-id: assignments-consumer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "*"

app:
  kafka:
    assignment-topic: ${ASSIGNMENT_TOPIC:assignments.events}
  outbound:
    enabled: ${ASSIGNMENT_OUTBOUND_ENABLED:true}
    base-url: ${ASSIGNMENT_OUTBOUND_BASE_URL:http://localhost:9999}
    path: ${ASSIGNMENT_OUTBOUND_PATH:/v1/assignments}
    connect-timeout: 2s
    response-timeout: 5s

logging.level:
  com.firststudent.assignments: INFO
